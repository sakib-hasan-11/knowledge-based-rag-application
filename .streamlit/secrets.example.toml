# Streamlit Secrets Configuration
# Copy this file to .streamlit/secrets.toml and fill in your values
# This file is used by Streamlit to make secrets available to the app
#
# To use:
# 1. Copy this file: cp .streamlit/secrets.example.toml .streamlit/secrets.toml
# 2. Fill in your actual values
# 3. The file .streamlit/secrets.toml is in .gitignore, so your secrets won't be committed
#
# Note: On Streamlit Cloud, use the UI to set secrets instead

# FastAPI Backend URL
# Default: http://localhost:8000 (local development)
# For production, use your deployed API URL
API_BASE_URL = "http://localhost:8000"

# Optional: OpenAI API Key (if using for direct queries)
# OPENAI_API_KEY = "sk-your-key-here"

# Optional: Pinecone Configuration (if using for direct queries)
# PINECONE_API_KEY = "your-pinecone-api-key"
# PINECONE_HOST = "your-pinecone-host-url"

# Optional: AWS Configuration (if using for direct S3 access)
# AWS_ACCESS_KEY_ID = "your-aws-access-key"
# AWS_SECRET_ACCESS_KEY = "your-aws-secret-key"
# AWS_REGION = "us-east-1"
# S3_BUCKET_NAME = "your-bucket-name"
