name: RAG Application CD Pipeline

# WORKFLOW DISABLED - Run only manually via GitHub Actions
# Automatic push-triggered deployments are disabled for safety
on:
  workflow_dispatch:

# Deployment triggers (disabled):
# on:
#   push:
#     branches: [main]
#   workflow_dispatch:

env:
  ECR_REPOSITORY: apple-knowledge-rag

jobs:
  # =========================================================================
  # SEGMENT 1: BUILD & PUSH FASTAPI IMAGE (Currently DISABLED)
  # =========================================================================
  build-and-push-fastapi:
    if: true  # FastAPI builds ENABLED for ECR
    name: Build & Push FastAPI Image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true

      - name: Create ECR repository if not exists
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region "${{ secrets.AWS_REGION }}" 2>/dev/null; then
            aws ecr create-repository --repository-name "$REPO_NAME" --region "${{ secrets.AWS_REGION }}" --encryption-configuration encryptionType=AES256
          fi

      - name: Get ECR Registry
        id: ecr
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}" --region "${{ secrets.AWS_REGION }}" --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

      - name: Build FastAPI image
        id: build
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=${COMMIT_SHA:0:7}
          IMAGE_URI="$REGISTRY/$REPO_NAME:api"
          IMAGE_URI_LATEST="$REGISTRY/$REPO_NAME:api-latest"
          IMAGE_URI_COMMIT="$REGISTRY/$REPO_NAME:api-${SHORT_SHA}"
          docker build -f Dockerfile.api -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" -t "$IMAGE_URI_COMMIT" .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_uri_latest=$IMAGE_URI_LATEST" >> $GITHUB_OUTPUT
          echo "image_uri_commit=$IMAGE_URI_COMMIT" >> $GITHUB_OUTPUT

      - name: Push FastAPI image to ECR
        run: |
          docker push "${{ steps.build.outputs.image_uri }}"
          docker push "${{ steps.build.outputs.image_uri_latest }}"
          docker push "${{ steps.build.outputs.image_uri_commit }}"
          echo "✓ FastAPI image pushed successfully"

  # =========================================================================
  # SEGMENT 2: BUILD & PUSH STREAMLIT IMAGE (Currently DISABLED)
  # =========================================================================
  build-and-push-streamlit:
    name: Build & Push Streamlit Image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true

      - name: Create ECR repository if not exists
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region "${{ secrets.AWS_REGION }}" 2>/dev/null; then
            aws ecr create-repository --repository-name "$REPO_NAME" --region "${{ secrets.AWS_REGION }}" --encryption-configuration encryptionType=AES256
          fi

      - name: Get ECR Registry
        id: ecr
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}" --region "${{ secrets.AWS_REGION }}" --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

      - name: Build Streamlit image
        id: build
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=${COMMIT_SHA:0:7}
          IMAGE_URI="$REGISTRY/$REPO_NAME:streamlit"
          IMAGE_URI_LATEST="$REGISTRY/$REPO_NAME:streamlit-latest"
          IMAGE_URI_COMMIT="$REGISTRY/$REPO_NAME:streamlit-${SHORT_SHA}"
          docker build -f Dockerfile.streamlit -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" -t "$IMAGE_URI_COMMIT" .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_uri_latest=$IMAGE_URI_LATEST" >> $GITHUB_OUTPUT
          echo "image_uri_commit=$IMAGE_URI_COMMIT" >> $GITHUB_OUTPUT

      - name: Push Streamlit image to ECR
        run: |
          docker push "${{ steps.build.outputs.image_uri }}"
          docker push "${{ steps.build.outputs.image_uri_latest }}"
          docker push "${{ steps.build.outputs.image_uri_commit }}"
          echo "✓ Streamlit image pushed successfully"

  # =========================================================================
  # SEGMENT 3: BUILD & PUSH DATA INGESTION IMAGE (ACTIVE - For debugging)
  # =========================================================================
  build-and-push-data-ingestion:
    if: false  # Disabled - FastAPI only
    name: Build & Push Data Ingestion Image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true

      - name: Create ECR repository if not exists
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$AWS_REGION" 2>/dev/null; then
            echo "Creating ECR repository: $REPO_NAME"
            aws ecr create-repository --repository-name "$REPO_NAME" --region "$AWS_REGION" --image-scanning-configuration scanOnPush=true --encryption-configuration encryptionType=AES256
          else
            echo "✓ ECR repository already exists: $REPO_NAME"
          fi

      - name: Get ECR Registry
        id: ecr
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}" --region "${{ secrets.AWS_REGION }}" --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "ECR Registry: $ECR_REGISTRY"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}
          echo "✓ Logged in to ECR"

      - name: Build Data Ingestion image
        id: build
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=${COMMIT_SHA:0:7}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          IMAGE_URI="$REGISTRY/$REPO_NAME:data-ingestion"
          IMAGE_URI_LATEST="$REGISTRY/$REPO_NAME:data-ingestion-latest"
          IMAGE_URI_COMMIT="$REGISTRY/$REPO_NAME:data-ingestion-$SHORT_SHA"
          
          echo "📦 Building Data Ingestion Docker Image (Fresh Build - No Cache)"
          echo "  Repository: $REPO_NAME"
          echo "  Service Tag: data-ingestion"
          echo "  Commit: $SHORT_SHA"
          echo "  Timestamp: $TIMESTAMP"
          echo "  Build Time: $(date)"
          
          docker build \
            --no-cache \
            -f data_ingestion.Dockerfile \
            -t "$IMAGE_URI" \
            -t "$IMAGE_URI_LATEST" \
            -t "$IMAGE_URI_COMMIT" \
            --label "service=data-ingestion" \
            --label "commit=$SHORT_SHA" \
            --label "timestamp=$TIMESTAMP" \
            --label "build-time=$(date)" \
            .
          
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_uri_latest=$IMAGE_URI_LATEST" >> $GITHUB_OUTPUT
          echo "image_uri_commit=$IMAGE_URI_COMMIT" >> $GITHUB_OUTPUT
          echo "✓ Data Ingestion Docker image built successfully (Fresh - No Cache)"

      - name: Push Data Ingestion image to ECR
        run: |
          echo "🚀 Pushing Data Ingestion image to ECR..."
          echo ""
          echo "Pushing: ${{ steps.build.outputs.image_uri }}"
          docker push "${{ steps.build.outputs.image_uri }}"
          echo "✓ Pushed data-ingestion tag"
          echo ""
          echo "Pushing: ${{ steps.build.outputs.image_uri_latest }}"
          docker push "${{ steps.build.outputs.image_uri_latest }}"
          echo "✓ Pushed data-ingestion-latest tag"
          echo ""
          echo "Pushing: ${{ steps.build.outputs.image_uri_commit }}"
          docker push "${{ steps.build.outputs.image_uri_commit }}"
          echo "✓ Pushed commit-specific tag"
          echo ""
          echo "✅ Data Ingestion image pushed successfully with html5lib parser included"

      - name: Verify image in ECR
        run: |
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          AWS_REGION="${{ secrets.AWS_REGION }}"
          echo "🔍 Verifying Data Ingestion image in ECR repository: $REPO_NAME"
          aws ecr describe-images --repository-name "$REPO_NAME" --region "$AWS_REGION" --query 'imageDetails[*].[imageTags[0],imageSizeInBytes,imagePushedAt]' --output table
          echo "✓ Image verified successfully in ECR"

#=========================================================================
# HOW TO USE THIS PIPELINE:
#=========================================================================
# 
# Enable/Disable builds by changing the 'if' condition:
# 
# FastAPI builds:
#   - Change: if: false  →  if: true  in build-and-push-fastapi job
# 
# Streamlit builds:
#   - Change: if: false  →  if: true  in build-and-push-streamlit job
# 
# Data Ingestion (Always Active):
#   - Pushes automatically with every commit to main
#   - Currently debugging HTML parsing (html5lib addition)
#
# Required GitHub Secrets:
#   - AWS_REGION
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#
#   - S3_DOCUMENT_PREFIX: e.g., "raw_data/aapl-20250927.html"
#   - OPENAI_API_KEY: OpenAI API key for embeddings
#   - PINECONE_API_KEY: Pinecone API key
#   - PINECONE_HOST: Pinecone host URL
#   - PINECONE_INDEX_NAME: e.g., "rag-documents"
#   - PINECONE_ENVIRONMENT: e.g., "us-east-1"
#   - PINECONE_METRIC: e.g., "cosine"
#
# Built Images:
#   1. FastAPI (api) - Tags: api, api-latest, api-<commit-sha>
#   2. Streamlit (streamlit) - Tags: streamlit, streamlit-latest, streamlit-<commit-sha>
#   3. Data Ingestion (data-ingestion) - Tags: data-ingestion, data-ingestion-latest, data-ingestion-<commit-sha>
#
# All pushed to same ECR repository: apple-knowledge-rag
#
